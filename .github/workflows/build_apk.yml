name: Build Flet Android APK (Signed & Stable)
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Flutter Toolchain
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Build Engine Tools
        run: |
          pip install --upgrade pip
          pip install flet

      - name: Generate Custom Release Keystore (Google Play Protect Compliant)
        run: |
          # Create a secure digital signing key to bypass Google Play Protect alerts
          keytool -genkeypair -v \
            -keystore my-release-key.jks \
            -alias my-key-alias \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "my_strong_keystore_password" \
            -keypass "my_strong_keystore_password" \
            -dname "CN=MohammadSadegh, OU=ObsidianAPK, O=Dev, L=Tehran, S=Tehran, C=IR"

      - name: Build Android APK (Signed & Auto-Approve)
        run: |
          # Accept official Android SDK Licenses beforehand
          yes | sdkmanager --licenses || true
          
          # Stable, signed build with `--yes` added to skip interactive questions
          flet build apk \
            --verbose \
            --yes \
            --android-signing-key-store my-release-key.jks \
            --android-signing-key-store-password "my_strong_keystore_password" \
            --android-signing-key-alias my-key-alias \
            --android-signing-key-password "my_strong_keystore_password"

      - name: Upload Artifact APK
        uses: actions/upload-artifact@v4
        with:
          name: obsidian-flet-app
          path: build/apk/*.apk