name: Build Flet Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: # به شما اجازه می‌دهد دستی هم از تب Actions بیلد را استارت بزنید

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # پایدارترین نسخه پایتون برای فلت

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flet

      - name: Set up Android SDK & Accept Licenses
        run: |
          # معرفی مسیر اندروید پیش‌فرضی که روی سرورهای گیت‌هاب نصب است
          echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
          # تایید اتوماتیک لایسنس‌های اندروید به منظور جلوگیری از گیر کردن بیلد روی سوالات بله/خیر
          yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Build APK
        run: |
          # ارسال اتوماتیک پاسخ‌های 'بله' به خط فرمان فلت برای موافقت با نصب پکیج‌های اضافی
          yes | flet build apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: obsidian-release-apk
          path: build/apk/*.apk